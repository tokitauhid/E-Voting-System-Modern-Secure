<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="E-Voting System — Secure voter login portal. Sign in with your Voter ID to cast your vote.">
    <title>E-Voting System | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="auth-page-bg">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <div style="font-size: 2.2rem; margin-bottom: 12px; color: var(--secondary-color);">
                        <i class="fas fa-vote-yea" aria-hidden="true"></i>
                    </div>
                    <h2>E-VOTING SYSTEM</h2>
                    <p>Sign in to start your session</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="voterId">Voter ID</label>
                        <input type="text" id="voterId" placeholder="Enter Voter ID" required autocomplete="username">
                        <i class="fas fa-id-card icon" aria-hidden="true"></i>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter Password" required
                            autocomplete="current-password">
                        <i class="fas fa-eye icon toggle-password" id="togglePassword" id="toggleIcon"
                            aria-label="Toggle password visibility"></i>
                    </div>

                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; font-size: 0.85rem;">
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <input type="checkbox" id="remember" style="accent-color: var(--secondary-color);">
                            <label for="remember"
                                style="color: var(--text-muted); cursor: pointer; font-weight: 500;">Remember Me</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt" aria-hidden="true" style="margin-right: 6px;"></i> Sign In
                    </button>
                </form>

                <div class="auth-link" style="display: flex; flex-direction: column; gap: 8px;">
                    <a href="forgot_password.html">I forgot my password</a>
                    <a href="register.html">Don't have an account? Register</a>
                    <a href="admin_login.html"
                        style="color: var(--text-muted); font-size: 0.78rem; margin-top: 8px; font-weight: 500;">
                        <i class="fas fa-shield-alt" aria-hidden="true" style="margin-right: 4px;"></i>Admin Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
