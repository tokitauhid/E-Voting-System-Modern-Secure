<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="E-Voting System — Cast your vote securely. View candidates and participate in the election.">
    <title>E-Voting Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            background: var(--bg-color);
            min-height: 100vh;
            margin: 0;
        }

        /* ── Navbar ── */
        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .navbar .logo {
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }

        .navbar .logo i {
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        /* ── Container ── */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* ── Profile Sidebar ── */
        .sidebar-profile {
            flex: 1;
            min-width: 260px;
            max-width: 300px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            height: fit-content;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .profile-header {
            text-align: center;
            padding: 28px 20px 20px;
            background: linear-gradient(135deg, #f0f4ff, #e8efff);
            border-bottom: 1px solid var(--border-color);
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-light));
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 4px 16px rgba(59, 109, 214, 0.3);
        }

        .profile-header h3 {
            margin: 0 0 4px;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .profile-header p {
            margin: 0;
        }

        .profile-details {
            padding: 20px;
        }

        .profile-details h4 {
            margin: 0 0 12px;
            color: var(--primary-color);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .profile-details p {
            font-size: 0.88rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .badge-success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
        }

        .badge-warning {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        /* ── Main Section ── */
        .main-section {
            flex: 3;
            min-width: 0;
        }

        .header-section h2 {
            color: var(--primary-color);
            margin: 0 0 4px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-section p {
            color: var(--text-muted);
            margin: 0 0 24px;
            font-size: 0.92rem;
        }

        /* ── Candidate Cards ── */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .candidate-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: transform var(--transition), box-shadow var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .candidate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary-color), var(--accent-color));
            opacity: 0;
            transition: opacity var(--transition);
        }

        .candidate-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .candidate-card:hover::before {
            opacity: 1;
        }

        .candidate-img-placeholder {
            height: 160px;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary-color);
            font-size: 3.5rem;
            position: relative;
            overflow: hidden;
        }

        .candidate-img-placeholder::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(255, 255, 255, 0.6));
        }

        .candidate-info {
            padding: 1.5rem;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .candidate-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-color);
        }

        .candidate-party {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            font-weight: 500;
        }

        .btn-vote {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-light));
            color: white;
            border: none;
            padding: 11px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 700;
            font-family: var(--font);
            transition: all var(--transition);
            width: 100%;
            max-width: 200px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: auto;
        }

        .btn-vote:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 109, 214, 0.35);
        }

        .btn-vote:active {
            transform: translateY(0);
        }

        /* ── Vote Status Message ── */
        .status-message {
            margin-bottom: 1.5rem;
            padding: 1rem 1.2rem;
            border-radius: var(--radius-md);
            display: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .status-success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
            border: 1px solid #6ee7b7;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-success i {
            font-size: 1.2rem;
        }

        /* ── Vote Confirmation Modal ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-20px) scale(0.96);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .modal h3 {
            margin: 0 0 8px;
            color: var(--primary-color);
            font-size: 1.25rem;
            font-weight: 800;
        }

        .modal p {
            color: var(--text-muted);
            font-size: 0.92rem;
            margin: 0 0 6px;
        }

        .modal-actions {
            margin-top: 1.8rem;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
            border: none;
            padding: 11px 28px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-family: var(--font);
            font-size: 0.9rem;
            transition: all var(--transition);
        }

        .btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        .btn-cancel {
            background: #e2e8f0;
            color: var(--text-color);
            border: none;
            padding: 11px 28px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font);
            font-size: 0.9rem;
            transition: all var(--transition);
        }

        .btn-cancel:hover {
            background: #cbd5e1;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                margin: 1rem auto;
            }

            .sidebar-profile {
                max-width: 100%;
            }

            .main-section {
                min-width: 100%;
            }

            .candidates-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }

            .navbar {
                padding: 0 1rem;
            }

            .navbar .logo {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="logo">
            <i class="fas fa-vote-yea" aria-hidden="true"></i> E-VOTING SYSTEM
        </div>
        <div class="user-info">
            <span id="userDisplay">Loading...</span>
            <button id="logoutBtn" class="btn-logout">
                <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">

        <!-- Profile Section -->
        <aside class="sidebar-profile">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user" aria-hidden="true"></i>
                </div>
                <h3 id="profileName">User Name</h3>
                <p id="profileId" style="color: var(--text-muted); margin: 5px 0; font-size: 0.85rem;">ID: ---</p>
                <div style="margin-top: 10px;">
                    <span id="profileStatus" class="badge badge-warning">Loading...</span>
                </div>
            </div>
            <div class="profile-details">
                <h4>Account Info</h4>
                <p>
                    <i class="fas fa-shield-alt" aria-hidden="true" style="color: var(--success-color);"></i> Secure
                    Voter
                </p>
            </div>
        </aside>

        <!-- Main Voting Area -->
        <div class="main-section">
            <div class="header-section">
                <h2>Cast Your Vote</h2>
                <p>Select your preferred candidate below. Once cast, your vote is final.</p>
                <div id="voteStatus" class="status-message"></div>
            </div>

            <div class="candidates-grid" id="candidatesGrid">
                <div style="text-align: center; width: 100%; color: var(--text-muted); padding: 2rem;">
                    <i class="fas fa-spinner fa-spin"
                        style="font-size: 1.5rem; margin-bottom: 8px; display: block;"></i>
                    Loading candidates...
                </div>
            </div>
        </div>
    </div>

    <!-- Vote Confirmation Modal -->
    <div id="confirmModal" class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
        <div class="modal-content">
            <div style="font-size: 2.5rem; color: var(--secondary-color); margin-bottom: 12px;">
                <i class="fas fa-check-circle" aria-hidden="true"></i>
            </div>
            <h3 id="modalTitle">Confirm Vote</h3>
            <p>Are you sure you want to vote for <b id="modalCandidateName" style="color: var(--secondary-color);"></b>?
            </p>
            <p style="font-size: 0.82rem; color: #94a3b8;">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmVote()">
                    <i class="fas fa-check" aria-hidden="true" style="margin-right: 4px;"></i> Confirm Vote
                </button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/vote.js"></script>

</body>

</html>
