<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting | Voter Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Voter Registration</h2>
                <p>Create your account to cast your vote</p>
            </div>

            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter full name" required>
                    <i class="fas fa-user icon"></i>
                </div>

                <div class="input-group">
                    <label>Voter ID</label>
                    <input type="text" id="voterId" placeholder="Unique Voter ID (min 5 chars)" required>
                    <i class="fas fa-id-card icon"></i>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password (min 6 chars)" required>
                    <i class="fas fa-lock icon" style="right: 35px;"></i>
                    <i class="fas fa-eye icon toggle-password" id="togglePassword" id="toggleIcon"
                        style="right: 10px;"></i>
                </div>

                <button type="submit" class="btn-primary">Register</button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
