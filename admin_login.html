<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Voting System — Restricted admin access portal for election management.">
    <title>E-Voting | Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .auth-box::before {
            background: linear-gradient(90deg, var(--danger-color), var(--danger-light), var(--accent-color)) !important;
        }

        .btn-primary.btn-danger {
            background: linear-gradient(135deg, var(--danger-color), #b91c1c);
        }

        .btn-primary.btn-danger:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.35);
        }
    </style>
</head>

<body>

    <div class="auth-page-bg">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <div style="font-size: 2.2rem; margin-bottom: 12px; color: var(--danger-color);">
                        <i class="fas fa-user-shield" aria-hidden="true"></i>
                    </div>
                    <h2 style="color: var(--danger-color);">Admin Login</h2>
                    <p>Restricted Access Area</p>
                </div>

                <form id="adminLoginForm">
                    <div class="input-group">
                        <label for="adminUser">Username</label>
                        <input type="text" id="adminUser" placeholder="Enter Admin Username" required
                            autocomplete="username">
                        <i class="fas fa-user icon" aria-hidden="true"></i>
                    </div>

                    <div class="input-group">
                        <label for="adminPass">Password</label>
                        <input type="password" id="adminPass" placeholder="Enter Admin Password" required
                            autocomplete="current-password">
                        <i class="fas fa-lock icon" aria-hidden="true"></i>
                    </div>

                    <button type="submit" class="btn-primary btn-danger">
                        <i class="fas fa-sign-in-alt" aria-hidden="true" style="margin-right: 6px;"></i> Login as Admin
                    </button>
                </form>

                <div class="auth-link">
                    <a href="login.html"><i class="fas fa-arrow-left" aria-hidden="true"
                            style="margin-right: 4px;"></i>Back to Voter Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;

            const creds = Storage.get('adminCreds') || { username: 'admin', password: 'admin' };

            if (user === creds.username && pass === creds.password) {
                Storage.set('adminSession', true);
                Toast.show('Login Successful!', 'success');
                setTimeout(() => window.location.href = 'admin_dashboard.html', 1000);
            } else {
                Toast.show('Invalid Admin Credentials!', 'error');
            }
        });
    </script>

</body>

</html>
