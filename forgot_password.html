<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting | Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your Voter ID and Full Name to reset</p>
            </div>

            <form id="resetForm">
                <div class="input-group">
                    <label>Voter ID</label>
                    <input type="text" id="voterId" required>
                    <i class="fas fa-id-card icon"></i>
                </div>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required>
                    <i class="fas fa-user icon"></i>
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" required>
                    <i class="fas fa-lock icon"></i>
                </div>

                <button type="submit" class="btn-primary">Reset Password</button>
            </form>

            <div class="auth-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const voterId = document.getElementById('voterId').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const newPass = document.getElementById('newPass').value;
            const btn = e.target.querySelector('button');

            if (newPass.length < 6) {
                Toast.show('Password too short (min 6 chars)', 'warning');
                return;
            }

            UI.setLoading(btn, true, 'Reset Password');

            setTimeout(async () => {
                const users = Storage.get('registeredUsers') || [];
                const userIndex = users.findIndex(u => u.voterId === voterId && u.fullName === fullName);

                if (userIndex !== -1) {
                    // Update password
                    users[userIndex].password = await Storage.hash(newPass);
                    Storage.set('registeredUsers', users);

                    UI.setLoading(btn, false, 'Reset Password');
                    Toast.show('Password Reset Successfully!', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    UI.setLoading(btn, false, 'Reset Password');
                    Toast.show('User details not found!', 'error');
                }
            }, 1000);
        });
    </script>

</body>

</html>
