<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Voting System — Reset your voter account password securely.">
    <title>E-Voting | Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="auth-page-bg">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <div style="font-size: 2.2rem; margin-bottom: 12px; color: var(--accent-color);">
                        <i class="fas fa-key" aria-hidden="true"></i>
                    </div>
                    <h2>Reset Password</h2>
                    <p>Enter your Voter ID and Full Name to reset</p>
                </div>

                <form id="resetForm">
                    <div class="input-group">
                        <label for="voterId">Voter ID</label>
                        <input type="text" id="voterId" placeholder="Enter your Voter ID" required
                            autocomplete="username">
                        <i class="fas fa-id-card icon" aria-hidden="true"></i>
                    </div>

                    <div class="input-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required
                            autocomplete="name">
                        <i class="fas fa-user icon" aria-hidden="true"></i>
                    </div>

                    <div class="input-group">
                        <label for="newPass">New Password</label>
                        <input type="password" id="newPass" placeholder="Create new password (min 6 chars)" required
                            autocomplete="new-password">
                        <i class="fas fa-lock icon" aria-hidden="true"></i>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-redo" aria-hidden="true" style="margin-right: 6px;"></i> Reset Password
                    </button>
                </form>

                <div class="auth-link">
                    <a href="login.html"><i class="fas fa-arrow-left" aria-hidden="true"
                            style="margin-right: 4px;"></i>Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const voterId = document.getElementById('voterId').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const newPass = document.getElementById('newPass').value;
            const btn = e.target.querySelector('button');

            if (newPass.length < 6) {
                Toast.show('Password too short (min 6 chars)', 'warning');
                return;
            }

            UI.setLoading(btn, true, 'Reset Password');

            setTimeout(async () => {
                const users = Storage.get('registeredUsers') || [];
                const userIndex = users.findIndex(u => u.voterId === voterId && u.fullName === fullName);

                if (userIndex !== -1) {
                    users[userIndex].password = await Storage.hash(newPass);
                    Storage.set('registeredUsers', users);

                    UI.setLoading(btn, false, 'Reset Password');
                    Toast.show('Password Reset Successfully!', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    UI.setLoading(btn, false, 'Reset Password');
                    Toast.show('User details not found!', 'error');
                }
            }, 1000);
        });
    </script>

</body>

</html>
